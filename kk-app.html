<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ippo — 生理周期・卵巣ケア記録アプリ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --rose: #c9747a;
  --rose-light: #f0d5d7;
  --rose-pale: #fdf3f3;
  --sage: #8aab96;
  --sage-light: #d6e8dd;
  --warm: #e8c49a;
  --warm-light: #f9edd8;
  --ink: #2c2420;
  --ink-mid: #5a4a44;
  --ink-light: #9a8880;
  --cream: #faf6f2;
  --white: #ffffff;
  --shadow: rgba(44,36,32,0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
}
h1, h2, h3, .serif { font-family: 'Shippori Mincho', serif; }
#app { max-width: 430px; margin: 0 auto; min-height: 100vh; position: relative; }
.screen { display: none; min-height: 100vh; padding-bottom: 80px; }
.screen.active { display: block; }

/* ===== ONBOARDING ===== */
#screen-welcome {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; padding: 40px 32px;
  background: linear-gradient(160deg, #fdf3f3 0%, #faf6f2 50%, #f0ebe6 100%);
  text-align: center;
}
.welcome-logo { font-family: 'Shippori Mincho', serif; font-size: 13px; letter-spacing: 0.3em; color: var(--rose); margin-bottom: 8px; text-transform: uppercase; }
.welcome-tagline { font-family: 'Shippori Mincho', serif; font-size: 26px; line-height: 1.6; color: var(--ink); margin-bottom: 12px; }
.welcome-sub { font-size: 13px; color: var(--ink-light); line-height: 1.8; margin-bottom: 40px; font-weight: 300; }
.before-after { width: 100%; margin-bottom: 40px; }
.ba-label { font-size: 10px; letter-spacing: 0.2em; color: var(--ink-light); margin-bottom: 12px; text-transform: uppercase; }
.ba-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.ba-card { background: var(--white); border-radius: 14px; padding: 16px 14px; text-align: left; box-shadow: 0 2px 12px var(--shadow); }
.ba-card.after { background: linear-gradient(135deg, #fdf3f3, #f9edd8); border: 1px solid var(--rose-light); }
.ba-card-tag { font-size: 9px; letter-spacing: 0.15em; padding: 3px 8px; border-radius: 20px; display: inline-block; margin-bottom: 10px; font-weight: 500; }
.ba-card.before .ba-card-tag { background: #f0ebe6; color: var(--ink-light); }
.ba-card.after .ba-card-tag { background: var(--rose-light); color: var(--rose); }
.ba-card-text { font-size: 12px; line-height: 1.7; color: var(--ink-mid); }
.ba-card.after .ba-card-text { color: var(--ink); }
.ba-arrow { display: flex; align-items: center; justify-content: center; margin: 4px 0; color: var(--rose); font-size: 18px; }
.welcome-name-section { width: 100%; }
.welcome-name-label { font-family: 'Shippori Mincho', serif; font-size: 18px; margin-bottom: 16px; color: var(--ink); }
.welcome-input { width: 100%; border: none; border-bottom: 2px solid var(--rose-light); background: transparent; font-size: 18px; font-family: 'Noto Sans JP', sans-serif; color: var(--ink); padding: 10px 4px; outline: none; text-align: center; transition: border-color 0.3s; margin-bottom: 32px; }
.welcome-input:focus { border-color: var(--rose); }
.welcome-input::placeholder { color: var(--ink-light); font-size: 14px; }
.btn-primary { width: 100%; padding: 16px; background: var(--rose); color: white; border: none; border-radius: 50px; font-family: 'Noto Sans JP', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.3s; letter-spacing: 0.05em; }
.btn-primary:hover { background: #b8666c; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(201,116,122,0.3); }
.btn-skip { background: none; border: none; color: var(--ink-light); font-size: 12px; cursor: pointer; margin-top: 12px; padding: 8px; }

/* ===== NAV ===== */
.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: rgba(250,246,242,0.95); backdrop-filter: blur(12px); border-top: 1px solid rgba(200,180,170,0.2); display: flex; z-index: 100; padding: 6px 0 8px; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 6px 4px; cursor: pointer; border: none; background: none; color: var(--ink-light); font-size: 9px; font-family: 'Noto Sans JP', sans-serif; letter-spacing: 0.05em; transition: all 0.2s; gap: 3px; }
.nav-item.active { color: var(--rose); }
.nav-icon { font-size: 20px; line-height: 1; }

/* ===== HOME ===== */
.home-header { padding: 52px 24px 0; background: linear-gradient(160deg, #fdf3f3 0%, var(--cream) 100%); }
.home-greeting { font-family: 'Shippori Mincho', serif; font-size: 22px; color: var(--ink); margin-bottom: 4px; }
.home-date { font-size: 12px; color: var(--ink-light); letter-spacing: 0.05em; margin-bottom: 24px; }

/* ===== FASTING TIMER ===== */
.fasting-widget { background: linear-gradient(135deg, #2c2420, #3d302a); border-radius: 20px; padding: 20px; margin: 0 24px 20px; color: white; position: relative; overflow: hidden; }
.fasting-widget::before { content: ''; position: absolute; top: -20px; right: -20px; width: 80px; height: 80px; border-radius: 50%; background: rgba(201,116,122,0.2); }
.fw-label { font-size: 10px; letter-spacing: 0.2em; color: rgba(255,255,255,0.5); margin-bottom: 8px; }
.fw-timer { font-family: 'Shippori Mincho', serif; font-size: 36px; font-weight: 700; letter-spacing: 0.05em; margin-bottom: 4px; }
.fw-status { font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: 16px; }
.fw-buttons { display: flex; gap: 8px; }
.fw-btn { flex: 1; padding: 10px; border-radius: 12px; border: none; font-family: 'Noto Sans JP', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.2s; font-weight: 500; }
.fw-btn.start { background: var(--rose); color: white; }
.fw-btn.stop { background: rgba(255,255,255,0.15); color: white; }
.fw-btn:hover { opacity: 0.85; }
.fw-goal-pills { display: flex; gap: 6px; margin-bottom: 14px; }
.fw-pill { padding: 4px 10px; border-radius: 20px; font-size: 11px; background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); cursor: pointer; border: 1px solid transparent; transition: all 0.2s; }
.fw-pill.active { background: var(--rose); color: white; border-color: var(--rose); }

/* ===== MILESTONES ===== */
.milestone-row { display: flex; gap: 10px; padding: 0 24px; margin-bottom: 20px; }
.milestone-card { flex: 1; background: var(--white); border-radius: 16px; padding: 14px; text-align: center; box-shadow: 0 2px 10px var(--shadow); }
.mc-number { font-family: 'Shippori Mincho', serif; font-size: 28px; color: var(--ink); line-height: 1; margin-bottom: 4px; }
.mc-label { font-size: 10px; color: var(--ink-light); letter-spacing: 0.05em; }
.mc-unit { font-size: 11px; color: var(--ink-mid); }

/* ===== UNLOCK ===== */
.unlock-section { margin: 0 24px 20px; background: var(--white); border-radius: 20px; padding: 20px; box-shadow: 0 2px 12px var(--shadow); }
.unlock-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.unlock-title { font-family: 'Shippori Mincho', serif; font-size: 15px; color: var(--ink); }
.unlock-days { font-size: 12px; color: var(--rose); font-weight: 500; }
.unlock-items { display: flex; flex-direction: column; gap: 10px; }
.unlock-item { display: flex; align-items: center; gap: 12px; }
.unlock-icon { width: 36px; height: 36px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.unlock-icon.locked { background: #f0ebe6; filter: grayscale(1); }
.unlock-icon.unlocked { background: var(--rose-light); }
.unlock-text { flex: 1; }
.unlock-text-title { font-size: 13px; color: var(--ink); font-weight: 500; }
.unlock-text-sub { font-size: 11px; color: var(--ink-light); }
.unlock-badge { font-size: 10px; padding: 3px 8px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
.unlock-badge.unlocked { background: var(--rose-light); color: var(--rose); }
.unlock-badge.locked { background: #f0ebe6; color: var(--ink-light); }
.progress-bar-wrap { margin: 14px 0 0; }
.progress-bar-bg { background: #f0ebe6; border-radius: 10px; height: 6px; overflow: hidden; }
.progress-bar-fill { height: 100%; border-radius: 10px; background: linear-gradient(90deg, var(--rose-light), var(--rose)); transition: width 1s ease; }
.progress-bar-labels { display: flex; justify-content: space-between; margin-top: 6px; }
.pb-label { font-size: 10px; color: var(--ink-light); }
.pb-label.active { color: var(--rose); font-weight: 500; }

/* ===== TODAY MESSAGE ===== */
.today-msg { margin: 0 24px 20px; background: linear-gradient(135deg, var(--rose-pale), var(--warm-light)); border-radius: 20px; padding: 20px; border-left: 3px solid var(--rose); }
.tm-label { font-size: 10px; letter-spacing: 0.2em; color: var(--rose); margin-bottom: 8px; text-transform: uppercase; }
.tm-text { font-family: 'Shippori Mincho', serif; font-size: 15px; line-height: 1.8; color: var(--ink); }

/* ===== CALENDAR ===== */
.calendar-section { margin: 0 24px 20px; background: var(--white); border-radius: 20px; padding: 20px; box-shadow: 0 2px 12px var(--shadow); }
.cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.cal-label { font-family: 'Shippori Mincho', serif; font-size: 16px; color: var(--ink); }
.cal-nav { display: flex; gap: 6px; }
.cal-nav-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid rgba(200,180,170,0.3); background: var(--white); color: var(--ink-light); font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.cal-nav-btn:hover { background: var(--rose-pale); color: var(--rose); }
.cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 8px; }
.cal-wd { text-align: center; font-size: 10px; color: var(--ink-light); padding: 4px 0; letter-spacing: 0.05em; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-day { text-align: center; padding: 8px 0; font-size: 13px; color: var(--ink-mid); border-radius: 10px; cursor: pointer; transition: all 0.2s; position: relative; }
.cal-day:hover { background: var(--rose-pale); }
.cal-day.empty { pointer-events: none; }
.cal-day.today { background: var(--rose); color: white; font-weight: 600; border-radius: 50%; }
.cal-day.has-record::after { content: ''; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); width: 5px; height: 5px; border-radius: 50%; background: var(--rose); }
.cal-day.today.has-record::after { background: white; }

/* ===== DAY DETAIL MODAL ===== */
.dm-overlay { position: fixed; inset: 0; z-index: 500; background: rgba(44,36,32,0.5); backdrop-filter: blur(6px); display: none; align-items: center; justify-content: center; }
.dm-overlay.dm-open { display: flex; }
.dm-box { width: 88%; max-width: 360px; max-height: 82vh; background: var(--cream); border-radius: 24px; padding: 28px 22px; overflow-y: auto; position: relative; box-shadow: 0 12px 40px rgba(44,36,32,0.15); }
.dm-box::-webkit-scrollbar { width: 3px; }
.dm-box::-webkit-scrollbar-thumb { background: rgba(44,36,32,0.1); border-radius: 2px; }
.dm-x { position: absolute; top: 12px; right: 12px; width: 32px; height: 32px; border-radius: 50%; border: 1px solid rgba(200,180,170,0.3); background: var(--white); color: var(--ink-light); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.dm-x:hover { background: var(--rose-pale); color: var(--rose); }
.dm-date { font-family: 'Shippori Mincho', serif; font-size: 17px; text-align: center; margin-bottom: 20px; color: var(--ink); }
.dm-empty { text-align: center; padding: 32px 0; font-size: 14px; color: var(--ink-light); line-height: 2; }
.dm-donut-wrap { position: relative; width: 160px; height: 160px; margin: 0 auto 12px; }
.dm-donut-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.dm-donut-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; pointer-events: none; }
.dm-donut-num { font-family: 'Shippori Mincho', serif; font-size: 22px; font-weight: 700; color: var(--ink); }
.dm-donut-label { font-size: 9px; color: var(--ink-light); letter-spacing: 0.15em; margin-top: 2px; }
.dm-legend { display: flex; justify-content: center; gap: 16px; margin: 4px 0 16px; }
.dm-legend span { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--ink-mid); }
.dm-legend-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.dm-summary { display: flex; justify-content: center; gap: 24px; margin: 16px 0 8px; }
.dm-summary-item { text-align: center; }
.dm-summary-num { font-family: 'Shippori Mincho', serif; font-size: 16px; font-weight: 700; line-height: 1; }
.dm-summary-lbl { font-size: 10px; color: var(--ink-light); margin-top: 4px; }
.dm-record-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 16px; justify-content: center; }
.dm-tag { font-size: 11px; padding: 5px 12px; border-radius: 20px; background: var(--rose-pale); color: var(--rose); }

/* ===== RECORD BUTTON ===== */
.record-cta { margin: 0 24px 24px; }
.record-btn-main { width: 100%; padding: 18px; background: var(--ink); color: white; border: none; border-radius: 16px; font-family: 'Shippori Mincho', serif; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.3s; }
.record-btn-main:hover { background: var(--rose); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(44,36,32,0.2); }

/* ===== SECTION CARD ===== */
.section-card { margin: 0 24px 20px; background: var(--white); border-radius: 20px; padding: 20px; box-shadow: 0 2px 12px var(--shadow); }
.section-label { font-size: 10px; letter-spacing: 0.2em; color: var(--ink-light); text-transform: uppercase; margin-bottom: 14px; }
.section-title { font-family: 'Shippori Mincho', serif; font-size: 17px; color: var(--ink); margin-bottom: 16px; }
.chakra-diagnosis-link { display: flex; align-items: center; justify-content: space-between; background: linear-gradient(135deg, #fdf3f3, #f9edd8); border-radius: 14px; padding: 16px; cursor: pointer; border: 1px solid var(--rose-light); transition: all 0.2s; text-decoration: none; }
.chakra-diagnosis-link:hover { box-shadow: 0 4px 16px var(--shadow); transform: translateY(-1px); }
.cdl-text .cdl-title { font-size: 14px; color: var(--ink); font-weight: 500; margin-bottom: 3px; }
.cdl-text .cdl-sub { font-size: 12px; color: var(--ink-light); }
.cdl-arrow { font-size: 20px; color: var(--rose); }

/* ===== SHARE ===== */
.share-section { margin: 0 24px 20px; }
.share-btn { width: 100%; padding: 14px; background: var(--white); border: 1.5px solid var(--rose-light); border-radius: 14px; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; color: var(--rose); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; }
.share-btn:hover { background: var(--rose-pale); }

/* ===== INSIGHTS ===== */
#screen-insights { padding: 52px 0 80px; }
.insights-header { padding: 0 24px 24px; }
.insights-title { font-family: 'Shippori Mincho', serif; font-size: 24px; color: var(--ink); margin-bottom: 4px; }
.insights-sub { font-size: 13px; color: var(--ink-light); }
.stats-grid { margin: 0 24px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.stat-card { background: var(--white); border-radius: 16px; padding: 16px; box-shadow: 0 2px 10px var(--shadow); }
.stat-label { font-size: 10px; color: var(--ink-light); letter-spacing: 0.05em; margin-bottom: 6px; }
.stat-value { font-family: 'Shippori Mincho', serif; font-size: 26px; color: var(--ink); line-height: 1; margin-bottom: 2px; }
.stat-unit { font-size: 11px; color: var(--ink-mid); }
.sample-graph-section { margin: 0 24px 20px; background: var(--white); border-radius: 20px; padding: 20px; box-shadow: 0 2px 12px var(--shadow); }
.sg-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
.sg-title { font-family: 'Shippori Mincho', serif; font-size: 15px; color: var(--ink); }
.sg-tabs { display: flex; gap: 4px; }
.sg-tab { font-size: 11px; padding: 4px 10px; border-radius: 20px; cursor: pointer; border: none; background: #f0ebe6; color: var(--ink-light); transition: all 0.2s; }
.sg-tab.active { background: var(--rose); color: white; }
.demo-graph { position: relative; }
.demo-chart-svg { width: 100%; height: 120px; }
.demo-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; background: rgba(250,246,242,0.7); backdrop-filter: blur(3px); border-radius: 8px; }
.demo-overlay-inner { text-align: center; }
.demo-overlay-title { font-size: 13px; font-weight: 500; color: var(--ink); margin-bottom: 4px; }
.demo-overlay-sub { font-size: 11px; color: var(--ink-light); }

/* ===== PATTERN ===== */
.pattern-section { margin: 0 24px 20px; background: linear-gradient(135deg, var(--ink) 0%, #3d302a 100%); border-radius: 20px; padding: 24px; color: white; }
.ps-label { font-size: 10px; letter-spacing: 0.2em; color: rgba(255,255,255,0.4); margin-bottom: 12px; }
.ps-text { font-family: 'Shippori Mincho', serif; font-size: 15px; line-height: 1.9; color: rgba(255,255,255,0.9); margin-bottom: 16px; }
.ps-locked { display: flex; align-items: center; gap: 8px; padding: 12px; background: rgba(255,255,255,0.07); border-radius: 12px; font-size: 12px; color: rgba(255,255,255,0.5); }

/* ===== RECORD MODAL ===== */
.modal-overlay { position: fixed; inset: 0; background: rgba(44,36,32,0.5); z-index: 200; display: none; align-items: flex-end; backdrop-filter: blur(4px); }
.modal-overlay.active { display: flex; }
.modal-sheet { width: 100%; max-width: 430px; margin: 0 auto; background: var(--cream); border-radius: 24px 24px 0 0; padding: 0 0 40px; max-height: 92vh; overflow-y: auto; animation: slideUp 0.3s ease; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle { width: 36px; height: 4px; background: rgba(44,36,32,0.15); border-radius: 2px; margin: 12px auto 20px; }
.modal-header { padding: 0 24px 20px; border-bottom: 1px solid rgba(200,180,170,0.2); margin-bottom: 20px; }
.modal-step-indicator { display: flex; gap: 6px; margin-bottom: 16px; }
.step-dot { flex: 1; height: 3px; border-radius: 2px; background: #f0ebe6; transition: background 0.3s; }
.step-dot.active { background: var(--rose); }
.step-dot.done { background: var(--sage); }
.modal-title { font-family: 'Shippori Mincho', serif; font-size: 20px; color: var(--ink); line-height: 1.5; margin-bottom: 6px; }
.modal-subtitle { font-size: 12px; color: var(--ink-light); }
.modal-body { padding: 0 24px; }
.score-selector { display: flex; gap: 8px; margin-bottom: 24px; }
.score-btn { flex: 1; padding: 14px 4px; border-radius: 14px; border: 2px solid transparent; background: var(--white); font-family: 'Shippori Mincho', serif; font-size: 18px; cursor: pointer; text-align: center; transition: all 0.2s; box-shadow: 0 2px 8px var(--shadow); }
.score-btn:hover { border-color: var(--rose-light); }
.score-btn.selected { border-color: var(--rose); background: var(--rose-pale); }
.score-label { font-size: 9px; color: var(--ink-light); font-family: 'Noto Sans JP', sans-serif; margin-top: 2px; display: block; }
.chakra-simple { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
.chakra-item { display: flex; align-items: center; gap: 12px; padding: 14px; background: var(--white); border-radius: 14px; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; box-shadow: 0 1px 6px var(--shadow); }
.chakra-item:hover { border-color: var(--rose-light); }
.chakra-item.selected { border-color: var(--rose); background: var(--rose-pale); }
.chakra-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.chakra-name { font-size: 14px; color: var(--ink); flex: 1; }
.chakra-desc { font-size: 11px; color: var(--ink-light); }
.chakra-item.featured { border-color: var(--rose-light); background: var(--rose-pale); }
.chakra-star { color: var(--rose); font-size: 12px; }
.chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
.chip { padding: 8px 14px; border-radius: 20px; background: var(--white); border: 1.5px solid #e8ddd8; font-size: 12px; color: var(--ink-mid); cursor: pointer; transition: all 0.2s; box-shadow: 0 1px 4px var(--shadow); }
.chip:hover { border-color: var(--rose-light); }
.chip.selected { background: var(--rose-pale); border-color: var(--rose); color: var(--rose); }
.emotion-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 24px; }
.emotion-btn { padding: 14px 8px; border-radius: 16px; background: var(--white); border: 2px solid transparent; cursor: pointer; text-align: center; transition: all 0.2s; box-shadow: 0 2px 8px var(--shadow); }
.emotion-btn:hover { border-color: var(--rose-light); }
.emotion-btn.selected { border-color: var(--rose); background: var(--rose-pale); }
.emotion-emoji { font-size: 24px; display: block; margin-bottom: 4px; }
.emotion-label { font-size: 11px; color: var(--ink-mid); line-height: 1.4; }
.modal-textarea { width: 100%; border: 1.5px solid #e8ddd8; border-radius: 14px; padding: 14px; font-family: 'Noto Sans JP', sans-serif; font-size: 14px; color: var(--ink); background: var(--white); resize: none; outline: none; min-height: 80px; transition: border-color 0.2s; margin-bottom: 24px; }

.btn-secondary { flex: 1; padding: 14px; background: #f0ebe6; color: var(--ink-mid); border: none; border-radius: 14px; font-family: 'Noto Sans JP', sans-serif; font-size: 14px; cursor: pointer; transition: all 0.2s; }

.btn-save { flex: 2; padding: 14px; background: var(--rose); color: white; border: none; border-radius: 14px; font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
.btn-save:hover { background: #b8666c; }
