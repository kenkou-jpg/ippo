<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ippo — 女性のためのセルフケア記録アプリ</title>

<style>
:root {
  --accent:#E8614A;
  --text:#2a2a2a;
  --text2:#666;
  --text3:#999;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:var(--text);
}

/* ===== HERO ===== */
.hero{
  padding:140px 20px 100px;
  text-align:center;
  background:
    radial-gradient(circle at 70% 20%, rgba(232,97,74,0.18), transparent 40%),
    linear-gradient(#fff,#f7f3ef);
}

.hero h1{
  font-size:clamp(2.4rem,5vw,3.6rem);
  line-height:1.2;
}

.hero em{
  color:var(--accent);
  font-style:normal;
}

.hero-sub{
  color:var(--text2);
  margin:16px 0 32px;
}

.btn{
  background:var(--accent);
  color:#fff;
  padding:16px 34px;
  border-radius:30px;
  text-decoration:none;
  display:inline-block;
}

/* UI */
.phone{
  width:340px;
  margin:40px auto 0;
}

/* ===== CONDITIONS ===== */
.section{
  padding:100px 20px;
  text-align:center;
}

.conditions p{
  color:var(--text2);
  margin:10px 0;
}

/* ===== STATS ===== */
.stats{
  background:#fff;
}

.stats-inner{
  display:flex;
  justify-content:center;
  gap:50px;
}

.stat-num{
  color:var(--accent);
  font-size:2rem;
  font-weight:bold;
}

/* ===== SOLUTION ===== */
.solution-visual{
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
}

.box{
  background:#faf7f4;
  padding:14px 18px;
  border-radius:14px;
}

.result{
  background:rgba(232,97,74,0.1);
  color:var(--accent);
  padding:14px 18px;
  border-radius:14px;
}

/* ===== FEATURES ===== */
.features{
  background:#fafafa;
}

.feature{
  margin-bottom:40px;
}

.feature img{
  width:260px;
  margin-top:20px;
}

/* ===== FOOTER ===== */
.footer{
  text-align:center;
  padding:60px 20px;
  font-size:0.8rem;
  color:var(--text3);
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>
    なんとなく不調を、<br>
    <em>見える化する</em>
  </h1>
  <p class="hero-sub">周期・食事・気分をまとめて記録</p>
  <a href="app.html" class="btn">記録をはじめる</a>

  <img src="images/mockup_01_home.png" class="phone">
</section>

<!-- CONDITIONS -->
<section class="section conditions">
  <h2>こんな悩みありませんか？</h2>
  <p>なんとなく体調が悪い</p>
  <p>原因が分からない</p>
  <p>記録が続かない</p>
</section>

<!-- STATS -->
<section class="section stats">
  <h2>選ばれている理由</h2>
  <div class="stats-inner">
    <div>
      <div class="stat-num">5</div>
      <div>記録カテゴリ</div>
    </div>
    <div>
      <div class="stat-num">1–2分</div>
      <div>1日あたり</div>
    </div>
    <div>
      <div class="stat-num">¥0</div>
      <div>完全無料</div>
    </div>
  </div>
</section>

<!-- SOLUTION -->
<section class="section">
  <h2>すべてをつなげて記録</h2>

  <div class="solution-visual">
    <div class="box">周期</div>
    <div>＋</div>
    <div class="box">食事</div>
    <div>＋</div>
    <div class="box">気分</div>
    <div>→</div>
    <div class="result">体調のパターン</div>
  </div>
</section>

<!-- FEATURES -->
<section class="section features">
  <h2>できること</h2>

  <div class="feature">
    <h3>体調を記録</h3>
    <p>シンプルに毎日記録</p>
    <img src="images/mockup_01_home.png">
  </div>

  <div class="feature">
    <h3>食事を記録</h3>
    <p>体調との関係が見える</p>
    <img src="images/mockup_02_meal.png">
  </div>

  <div class="feature">
    <h3>カレンダーで確認</h3>
    <p>流れを一目で把握</p>
    <img src="images/mockup_05_calendar.png">
  </div>

</section>

<!-- FOOTER -->
<div class="footer">
  © ippo
</div>

</body>
</html>
